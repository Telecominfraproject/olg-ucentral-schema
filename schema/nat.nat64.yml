description: NAT64 configuration for IPv6-to-IPv4 translation.
type: object
properties:
  rule-number:
    description: Rule number for ordering (lower numbers processed first).
    type: integer
    minimum: 1
  source:
    description: IPv6 source prefix configuration.
    type: object
    properties:
      prefix:
        description: IPv6 source prefix to match.
        type: string
        format: uc-cidr6
        example: 2001:db8:1::/64
  translation:
    description: NAT64 translation parameters.
    type: object
    properties:
      ipv6-prefix:
        description: Well-known prefix or custom NAT64 prefix.
        type: string
        format: uc-cidr6
        default: 64:ff9b::/96
      ipv4-pool:
        description: IPv4 address pool for translated traffic.
        type: object
        properties:
          address:
            description: IPv4 address or address range for source NAT.
            type: string
            examples:
              - 198.51.100.1
              - 198.51.100.1-198.51.100.10
          port-range:
            type:
              - integer
              - string
            format: uc-portrange
            examples:
              - 80
              - 1024-65535
required:
  - rule-number
