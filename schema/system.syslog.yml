description: Syslog configuration.
type: object
properties:
  marker:
    type: object
    properties:
      enable:
        type: boolean
        default: true
      interval:
        description: Interval (in seconds) for sending mark messages to the syslog input.
        type: integer
        minimum: 1
        default: 1200
  preserve-fqdn:
    description: Always send the domain part of the hostname.
    type: boolean
    default: false
  local:
    description: Local syslog settings.
    type: array
    items:
      type: object
      properties:
        facility:
          description: Syslog facility to use for messages sent to this server.
          type: string
          enum:
          - all
          - kern
          - user
          - mail
          - daemon
          - auth
          - syslog
          - lpr
          - news
          - uucp
          - cron
          - security
          - ftp
          - ntp
          - logaudit
          - logalert
          - clock
          - local0
          - local1
          - local2
          - local3
          - local4
          - local5
          - local6
          - local7
          default: daemon
        severity:
          description: Minimum severity level of messages to send to this server.
          type: string
          enum:
          - emerg
          - alert
          - crit
          - err
          - warning
          - notice
          - info
          - debug
          default: info
      required:
        - facility
        - severity
  remote-hosts:
    description: Remote syslog servers.
    type: array
    items:
      type: object
      properties:
        address:
          description: IP address or hostname of the syslog server.
          type: string
          format: uc-ip
        port:
          description: Port number of the syslog server.
          type: integer
          maximum: 65535
          default: 514
        protocol:
          description: Transport protocol for syslog messages.
          type: string
          enum:
          - udp
          - tcp
          default: udp
        facility:
          description: Syslog facility to use for messages sent to this server.
          type: string
          enum:
          - all
          - kern
          - user
          - mail
          - daemon
          - auth
          - syslog
          - lpr
          - news
          - uucp
          - cron
          - security
          - ftp
          - ntp
          - logaudit
          - logalert
          - clock
          - local0
          - local1
          - local2
          - local3
          - local4
          - local5
          - local6
          - local7
          default: daemon
        severity:
          description: Minimum severity level of messages to send to this server.
          type: string
          enum:
          - emerg
          - alert
          - crit
          - err
          - warning
          - notice
          - info
          - debug
          default: info
      required:
      - address
      - facility
      - severity
