description: Static routing configuration.
type: object
properties:
  routes:
    description: List of static routes.
    type: array
    items:
      type: object
      properties:
        destination:
          description: Destination network (CIDR).
          type: string
          format: uc-cidr
        next-hop:
          description: Next-hop IP address.
          type: string
          format: uc-ip
        interface:
          description: Outgoing interface.
          type: string
        distance:
          description: Administrative distance.
          type: integer
          minimum: 1
          maximum: 255
          default: 1
        action:
          type: string
          enum:
          # - accept
          - reject
          - blackhole
        table:
          description: Custom table ID to store the route. Dont set this to use the main table.
          type: integer
          minimum: 1
          maximum: 200
      required:
      - destination
      - next-hop
