description: Firewall rule configuration.
type: object
properties:
  rule-number:
    description: Rule sequence number.
    type: integer
    minimum: 1
  description:
    type: string
  action:
    type: string
    enum:
    - accept
    - drop
    - reject
  protocol:
    description: Protocol to match.
    type: string
    examples:
    - tcp
    - udp
    - icmp
    - all
  source:
    type: object
    properties:
      address:
        type: string
      port:
        type: string
  destination:
    type: object
    properties:
      address:
        type: string
      port:
        type: string
  state:
    type: object
    properties:
      established:
        type: boolean
      related:
        type: boolean
      new:
        type: boolean
  log:
    type: boolean
    default: false
required:
- rule-number
- action
