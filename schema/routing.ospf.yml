description: OSPF routing protocol configuration.
type: object
properties:
  enabled:
    type: boolean
    default: false
  router-id:
    description: OSPF router ID.
    type: string
    format: ipv4
  areas:
    description: OSPF areas.
    type: array
    items:
      type: object
      properties:
        area-id:
          description: Area ID.
          type: integer
        area-type:
          type: string
          enum:
          - normal
          - stub
          - nssa
          default: normal
        networks:
          description: Networks in this area.
          type: array
          items:
            type: string
      required:
      - area-id
  interfaces:
    description: OSPF interface settings.
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        area:
          type: string
        cost:
          type: integer
        passive:
          type: boolean
          default: false
        network-type:
          type: string
          enum:
          - broadcast
          - point-to-point
          - non-broadcast
          - point-to-multipoint
      required:
      - name
  redistribute:
    type: object
    properties:
      connected:
        type: boolean
        default: false
      static:
        type: boolean
        default: false
      bgp:
        type: boolean
        default: false
