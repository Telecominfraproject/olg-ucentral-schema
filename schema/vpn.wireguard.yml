description:
  This Object defines the properties of a wireguard-overlay.
type: object
properties:
  interfaces:
    description: WireGuard interfaces.
    type: array
    items:
      type: object
      properties:
        name: 
          description:
            The name of the interface.
          type: string
        proto:
          description:
            This field must be set to wireguard-overlay.
          type: string
          const: wireguard-overlay
        private-key:
          description:
            The private key of the device. This key is used to lookup the host entry
            inside the config.
          type: string
        peer-port:
          description:
            The network port that shall be used to establish the wireguard tunnel.
          type: integer
          maximum: 65535
          minimum: 1
          default: 3456
        peer-exchange-port:
          description:
            The network port that shall be used to exchange peer data inside the tunnel.
          type: integer
          maximum: 65535
          minimum: 1
          default: 3458
        root-node:
          description:
            The descritption of the root node of the overlay.
          type: object
          properties:
            key:
              description:
                The public key of the host.
              type: string
            endpoint:
              description:
                The public IP of the host (optional).
              type: string
              format: uc-ip
            ipaddr:
              description:
                The list of private IPs that a host is reachable on inside the overlay.
              type: array
              items:
                type: string
                format: uc-cidr
        hosts:
          description:
            The list of all known hosts inside the overlay.
          type: array
          items:
            type: object
            properties:
              name:
                description:
                  The unique name of the host.
                type: string
              key:
                description:
                  The public key of the host.
                type: string
              endpoint:
                description:
                  The public IP of the host (optional).
                type: string
                format: uc-ip
              endport:
                description:
                  The public port of the host (optional).
                type: integer
                maximum: 65535
                minimum: 1
              subnet:
                description:
                  The list of subnets that shall be routed to this host.
                type: array
                items:
                  type: string
                  format: uc-cidr
              ipaddr:
                description:
                  The list of private IPs that a host is reachable on inside the overlay.
                type: array
                items:
                  type: string
                  format: uc-cidr
      required:
        - name
