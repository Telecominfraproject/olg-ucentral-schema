description: WireGuard VPN configuration.
type: object
properties:
  interfaces:
    description: Wireguard interfaces.
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        private-key:
          type: string
        address:
          type: string
          format: uc-ip
        port:
          type: integer
        peers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              public-key:
                type: string
              allowed-ips:
                type: array
                items:
                  type: string
                  format: uc-cidr
              endpoint:
                description: Peer endpoint (host:port).
                type: object
                properties:
                  address:
                    type: string
                    format: uc-ip
                  port:
                    type: integer
                    maximum: 65535
                    default: 51820
                required:
                - address
              persistent-keepalive:
                type: integer
            required:
            - name
            - public-key
            - allowed-ips
      required:
      - name
      - private-key
