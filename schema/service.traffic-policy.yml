description: Traffic policing configuration (shaping, rate limiting, priority-based queues).
type: object
properties:
  shaper:
    description: Traffic shaper policies for bandwidth management.
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        bandwidth:
          description: Available bandwidth.
          type: string
          example: 100mbit
        outbound-interface:
          description: Egress interface to apply this traffic shaper
          type: string
        classes:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                minimum: 2
                maximum: 4095
              bandwidth:
                description: Guarantee bandwidth (in percentage) of the class.
                type: string
                example: 40%
              match:
                description: Matching rules for this class.
                type: array
                items:
                  type: object
                  properties:
                    name:
                      description: Name of the matching rule
                      type: string
                    source:
                      description: Source matching criteria.
                      type: object
                      properties:
                        address:
                          description: Source address or network (CIDR).
                          type: string
                          anyOf:
                            - format: uc-cidr
                            - format: uc-ip
                        port:
                          description: Source port or range.
                          type:
                            - integer
                            - string
                          format: uc-portrange
                          examples:
                            - 2345
                            - 1024-65535
                    destination:
                      description: Destination matching criteria.
                      type: object
                      properties:
                        address:
                          description: Destination address or network (CIDR).
                          type: string
                          anyOf:
                            - format: uc-cidr
                            - format: uc-ip
                        port:
                          description: Destination port or range.
                          type:
                            - integer
                            - string
                          format: uc-portrange
                          examples:
                            - 2345
                            - 1024-65535
                    protocol:
                      description:
                        IP protocol to match.
                        Use "all" for all protocols and "tcp_udp" for both TCP and UDP.
                      type: string
                      examples:
                      - tcp
                      - tcp_udp
                      - icmp
                      - all
                    inbound-interface:
                      description: Match traffic arriving on this interface.
                      type: string
              burst:
                description: Size of token bucket (in bytes), which will be available to be sent at ceiling speed.
                type: string
                example: 15Kb
              ceiling:
                description: Maximum speed possible for this class. Default is bandwidth value.
                type: string
                example: 100mbit
              priority:
                description: Priority for usage of available bandwidth once guarantees have been met. The lower the priority number, the higher the priority.
                type: integer
                minimum: 0
                maximum: 7
                default: 0
              queue-type:
                type: string
                enum:
                - fq-codel
                - fair-queue
                - drop-tail
                default: fq-codel
            required:
            - id
            - bandwidth
      required:
      - name
      - bandwidth
