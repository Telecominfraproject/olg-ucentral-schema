description: NetFlow monitoring configuration.
type: object
properties:
  version:
    description: NetFlow protocol version (5, 9, or 10/IPFIX).
    type: string
    enum:
    - '5'
    - '9'
    - '10'
    default: '9'
  interfaces:
    description: Interfaces to collect flow data.
    type: array
    items:
      type: string
  servers:
    description: NetFlow collector servers.
    type: array
    items:
      type: object
      properties:
        address:
          type: string
          format: uc-ip
        port:
          type: integer
          maximum: 65535
      required:
      - address
  engine-id:
    description: Engine ID to identify this router.
    type: integer
    minimum: 0
    maximum: 255
  sampling-rate:
    description: Packet sampling rate (1 in N packets).
    type: integer
    default: 1
