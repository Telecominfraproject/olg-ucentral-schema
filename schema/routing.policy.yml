description: Policy-based routing configuration.
type: object
properties:
  name:
    type: string
  interface:
    description: Interface to apply this policy to.
    type: string
  address-family:
    description: IPv4 or IPv6 policy.
    type: string
    enum:
    - ipv4
    - ipv6
  rules:
    description: Policy routing rules.
    type: array
    items:
      type: object
      properties:
        name:
          description: Rule name for reference when binding to interfaces.
          type: string
        priority:
          description: Rule priority. Lower values evaluated first.
          type: integer
          minimum: 1
          maximum: 65535
        source:
          description: Source matching criteria.
          type: object
          properties:
            address:
              description: Source network (CIDR).
              type: string
              format: uc-cidr
            port:
              description: Source port or range.
              type:
                - integer
                - string
              format: uc-portrange
              examples:
                - 2345
                - 1024-65535
            group:
              description: Address/port group reference.
              type: string
            mac-address:
              description: Source MAC address.
              type: string
              format: uc-mac
              example: 98:e7:9a:27:fe:49
        destination:
          description: Destination matching criteria.
          type: object
          properties:
            address:
              description: Destination network (CIDR).
              type: string
              format: uc-cidr
            port:
              description: Destination port or range.
              type:
                - integer
                - string
              format: uc-portrange
              examples:
                - 2345
                - 1024-65535
            group:
              description: Address/port group reference.
              type: string
        protocol:
          description:
            IP protocol to match. 
            Use "all" for all protocols and "tcp_udp" for both TCP and UDP.
          type: string
          examples:
          - tcp
          - tcp_udp
          - icmp
          - all
        conn-mark:
          description: Connection mark number to match
          type: integer
          minimum: 1
          maximum: 2147483647
        mark:
          description: Packet mark number to match
          type: object
          properties:
            start:
              type: integer
              minimum: 1
              maximum: 2147483647
            end:
              type: integer
              minimum: 1
              maximum: 2147483647
        inbound-interface:
          description: Match traffic arriving on this interface.
          type: string
        action:
          description: Action for matching traffic. Use either table OR next-hop, not both.
          type: object
          properties:
            drop:
              description: Drop matching packets.
              type: boolean
              default: false
            next-hop:
              description: Override next-hop directly without specifying a table.
              type: string
              format: uc-ip
            set-conn-mark:
              description: Set connection mark.
              type: integer
              minimum: 1
              maximum: 2147483647
            set-mark:
              description: Set packet mark.
              type: integer
              minimum: 1
              maximum: 2147483647
            set-dscp:
              description: Set DSCP value.
              type: integer
              minimum: 0
              maximum: 63
      required:
        - priority
        - action
