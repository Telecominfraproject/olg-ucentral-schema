description: Policy-based routing configuration.
type: object
properties:
  rules:
    description: Policy routing rules.
    type: array
    items:
      type: object
      properties:
        address-family:
          type: enum
          enum:
          - route
          - route6
        priority:
          description: Rule priority.
          type: integer
        source:
          description: Source matching criterias
          type: array
          items:
            type: object
            properties:
              criteria:
                type: enum
                enum:
                - address
                - group
                - port
              address:
                type: string
              port:
                type: string
                example:
                - http
                - 1-100
                - snmp,65
              group:
                type: string
        destination:
          description: Destination matching criterias
          type: array
          items:
            type: object
            properties:
              criteria:
                type: enum
                enum:
                - address
                - group
                - port
              address:
                type: string
              port:
                type: string
                example:
                - http
                - 1-100
                - snmp,65
              group:
                type: string
        interface:
          description: Inbound interface to match.
          type: string
        action:
          type: object
          properties:
            type:
              type: enum
              enum:
              - drop
              - set-connection-mark
              - set-dscp
              - set-mark
              - set-table
            connection-mark:
              type: integer
              minimum: 1
              maximum: 2147483647
            dscp:
              type: integer
              minimum: 0
              maximum: 63
            mark:
              type: integer
              minimum: 1
              maximum: 2147483647
            table:
              type: string
              example:
              - main
              - 1-200
      required:
      - priority
  tables:
    description: Custom routing tables.
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        table-id:
          type: integer
        routes:
          type: array
          items:
            type: object
            properties:
              destination:
                type: string
              next-hop:
                type: string
      required:
      - name
      - table-id
