description: Policy-based routing configuration.
type: object
properties:
  rules:
    description: Policy routing rules.
    type: array
    items:
      type: object
      properties:
        name:
          description: Rule set name for reference when binding to interfaces.
          type: string
        priority:
          description: Rule priority. Lower values evaluated first.
          type: integer
          minimum: 1
          maximum: 65535
        description:
          description: Human-readable description.
          type: string
        address-family:
          description: IPv4 or IPv6 policy.
          type: string
          enum: [ipv4, ipv6]
          default: ipv4
        source:
          description: Source matching criteria.
          type: object
          properties:
            address:
              description: Source network (CIDR).
              type: string
            port:
              description: Source port or range.
              type: string
            group:
              description: Address/port group reference.
              type: string
            mac-address:
              description: Source MAC address.
              type: string
        destination:
          description: Destination matching criteria.
          type: object
          properties:
            address:
              description: Destination network (CIDR).
              type: string
            port:
              description: Destination port or range.
              type: string
            group:
              description: Address/port group reference.
              type: string
        protocol:
          description: IP protocol to match.
          type: string
          examples: [tcp, udp, icmp, all]
        inbound-interface:
          description: Match traffic arriving on this interface.
          type: string
        action:
          description: Action for matching traffic. Use either table OR next-hop, not both.
          type: object
          properties:
            drop:
              description: Drop matching packets.
              type: boolean
              default: false
            table:
              description: Routing table to use. Can be "main" for default table or custom table name/ID.
              type: string
              examples:
                - "main"
                - "10"
                - "ISP-A"
            next-hop:
              description: Override next-hop directly without specifying a table. Uses main table with forced gateway.
              type: string
              format: ipv4
            mark:
              description: Set firewall mark.
              type: integer
            dscp:
              description: Set DSCP value.
              type: integer
              minimum: 0
              maximum: 63
      required:
        - priority
        - action
  tables:
    description: Custom routing tables. Only needed when traffic requires different routes than main table.
    type: array
    items:
      type: object
      properties:
        name:
          description: Table name for reference in rules.
          type: string
        table-id:
          description: Numeric table ID (1-200).
          type: integer
          minimum: 1
          maximum: 200
        description:
          description: Purpose of this table.
          type: string
        routes:
          description: Routes in this table.
          type: array
          items:
            type: object
            properties:
              destination:
                description: Destination network (CIDR). Use 0.0.0.0/0 for default.
                type: string
              next-hop:
                description: Next-hop IP address.
                type: string
              interface:
                description: Outgoing interface.
                type: string
              distance:
                description: Administrative distance.
                type: integer
                default: 1
            required:
              - destination
      required:
        - name
        - table-id