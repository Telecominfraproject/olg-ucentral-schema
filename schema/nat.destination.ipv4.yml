description: IPv4 Destination NAT rule (DNAT/Port Forward).
type: object
properties:
  rule-number:
    description: Rule number for ordering (lower numbers processed first).
    type: integer
    minimum: 1
  inbound-interface:
    description: Inbound interface for NAT.
    type: string
  protocol:
    description: Protocol to match.
    type: string
    examples:
      - tcp
      - udp
      - icmp
      - all
  source:
    description: Source address/port to match.
    type: object
    properties:
      address:
        description: Source IPv4 network.
        type: string
        format: uc-cidr4
        example: 192.168.1.0/24
      port:
        description: Source port or port range.
        type: 
          - integer
          - string
        format: uc-portrange
        examples:
          - 80
          - 1024-65535
      group:
        description: Reference to a firewall address/network/port group.
        type: object
        properties:
          address-group:
            type: string
          network-group:
            type: string
          port-group:
            type: string
  destination:
    description: Original destination address/port to match.
    type: object
    properties:
      address:
        description: Original destination IPv4 network.
        type: string
        format: uc-cidr4
        example: 192.168.1.0/24
      port:
        description: Original destination port or port range.
        type: 
          - integer
          - string
        format: uc-portrange
        examples:
          - 80
          - 1024-65535
      group:
        description: Reference to a firewall address/network/port group.
        type: object
        properties:
          address-group:
            type: string
          network-group:
            type: string
          port-group:
            type: string
  translation:
    description: Translation parameters.
    type: object
    properties:
      address:
        description: Translated destination address.
        type: string
        format: uc-cidr4
        example: 192.168.1.0/24
      port:
        description: Translated destination port or port range.
        type: 
          - integer
          - string
        format: uc-portrange
        examples:
          - 80
          - 1024-65535
required:
  - rule-number
