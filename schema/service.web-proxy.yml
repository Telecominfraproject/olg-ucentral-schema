description: Proxy server with cache and filtering.
type: object
properties:
  default-port:
    description: Port used for all specified listen-address.
    type: integer
    default: 3128
    maximum: 65535
    minimum: 1
  servers:
    type: array
    items:
      type: object
      properties:
        address:
          description: IP address that the proxy server listens.
          type: string
          format: uc-ip
        port:
          description: Port number that the proxy server listens.
          type: integer
          maximum: 65535
          minimum: 1
        transparent-proxy:
          description: Automatically forward traffic arriving on port 80 destined for Internet.
          type: boolean
          default: true
      required:
      - address
  cache-size:
    description: Cache size in MB.
    type: integer
    default: 100
  append-domain:
    description: Domain to append to requests with unqualified hostnames.
    type: string
    format: hostname
  block-domains:
    description: Domains to block.
    type: array
    items:
      type: string
      format: hostname
  noncache-domains:
    description: Allow access to domains without retrieving them from the Proxy cache.
    type: array
    items:
      type: string
      format: hostname
