description: Firewall zone configuration.
type: object
properties:
  name:
    description: Zone name.
    type: string
  default-action:
    description: Default action for intra-zone traffic.
    type: string
    enum:
    - accept
    - drop
    - reject
    default: drop
  interfaces:
    description: Interfaces belonging to this zone.
    type: array
    items:
      type: string
  local-zone:
    description: Designate as local zone (traffic to/from router itself).
    type: boolean
    default: false
required:
- name
