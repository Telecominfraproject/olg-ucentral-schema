description: Firewall configuration (zone-based, stateful).
type: object
properties:
  state-policy:
    description: Global connection state policy applied before zone rules.
    type: object
    properties:
      established:
        type: string
        enum:
        - accept
        - drop
        - reject
        default: accept
      related:
        type: string
        enum:
        - accept
        - drop
        - reject
        default: accept
      invalid:
        type: string
        enum:
        - accept
        - drop
        - reject
        default: drop
  groups:
    type: array
    items:
      $ref: https://ucentral.io/schema/v1/firewall/groups/
  ipv4-rulesets:
    type: array
    items:
      $ref: https://ucentral.io/schema/v1/firewall/ruleset/ipv4/
  ipv6-rulesets:
    type: array
    items:
      $ref: https://ucentral.io/schema/v1/firewall/ruleset/ipv6/
  bridge-rulesets:
    type: array
    items:
      $ref: https://ucentral.io/schema/v1/firewall/ruleset/bridge/
  zones:
    type: array
    items:
      $ref: https://ucentral.io/schema/v1/firewall/zone/
  zone-policies:
    type: array
    items:
      $ref: https://ucentral.io/schema/v1/firewall/zone-policy/
