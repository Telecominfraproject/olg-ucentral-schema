description: Physical port configuration.
type: object
properties:
  speed:
    description: Link speed.
    type: string
    enum:
    - auto
    - '10'
    - '100'
    - '1000'
    - '2500'
    - '10000'
    default: auto
  duplex:
    description: Duplex mode.
    type: string
    enum:
    - auto
    - full
    - half
    default: auto
  options:
    description: Ethernet options
    type: array
    items:
      type: string
      enum:
      - enable-proxy-arp
      - disable-arp-filter
      - disable-forwarding