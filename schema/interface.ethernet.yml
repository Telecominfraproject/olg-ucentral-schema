description: Physical port configuration.
type: object
properties:
  speed:
    description: Link speed.
    type: string
    enum:
    - auto
    - '10'
    - '100'
    - '1000'
    - '2500'
    - '10000'
    default: auto
  duplex:
    description: Duplex mode.
    type: string
    enum:
    - auto
    - full
    - half
    default: auto
  vlan-tag:
    description:
      Shall the port have a vlan tag.
    type: string
    enum:
    - tagged
    - un-tagged
    - auto
    default: auto
  proxy-arp:
    type: object
    properties:
      enable:
        type: boolean
        default: false
  arp-filter:
    type: object
    properties:
      enable:
        type: boolean
        default: true
  forwarding:
    type: object
    properties:
      enable:
        type: boolean
        default: true
