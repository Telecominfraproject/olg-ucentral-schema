description: System configuration section.
type: object
properties:
  syslog:
    $ref: https://ucentral.io/schema/v1/system/syslog/
  netflow:
    $ref: https://ucentral.io/schema/v1/system/netflow/
  sflow:
    $ref: https://ucentral.io/schema/v1/system/sflow/
  name-servers:
    type: object
    properties:
      dhcp-interfaces:
        description: Use DNS servers from the DHCP interfaces
        type: array
        items:
          type: string
      addresses:
        description: DNS server addresses
        type: array
        items:
          type: string
          format: uc-ip
