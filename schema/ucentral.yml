$id: https://openwrt.org/olg.ucentral.schema.json
$schema: http://json-schema.org/draft-07/schema#
description: OpenLan Gateway (OLG) uCentral schema for L3 routers
type: object
properties:
  uuid:
    description:
      The unique ID of the configuration. This is the unix timestamp of when the config was created.
    type: integer
  unit:
    $ref: "https://ucentral.io/schema/v1/unit/"
  globals:
    $ref: "https://ucentral.io/schema/v1/globals/"
  firewall:
    $ref: "https://ucentral.io/schema/v1/firewall/"
  high-availability:
    $ref: "https://ucentral.io/schema/v1/high-availability/"
  interfaces:
    type: array
    items:
      $ref: "https://ucentral.io/schema/v1/interface/"
  load-balancing:
    $ref: "https://ucentral.io/schema/v1/load-balancing/"
  nat:
    $ref: "https://ucentral.io/schema/v1/nat/"
  pki:
    $ref: "https://ucentral.io/schema/v1/pki/"
  routing:
    $ref: "https://ucentral.io/schema/v1/routing/"
  qos:
    $ref: "https://ucentral.io/schema/v1/qos/"
  services:
    $ref: "https://ucentral.io/schema/v1/service/"
  system:
    $ref: "https://ucentral.io/schema/v1/system/"
  vpn:
    $ref: "https://ucentral.io/schema/v1/vpn/"
  metrics:
    $ref: "https://ucentral.io/schema/v1/metrics/"
  third-party:
    type: object
    additionalProperties: true
