description: IPv6 firewall rule configuration.
type: object
properties:
  rule-number:
    description: Rule sequence number. Lower numbers evaluated first.
    type: integer
    minimum: 1
    maximum: 65535
  disabled:
    type: boolean
    default: false
  action:
    type: string
    enum:
      - accept
      - drop
      - reject
  protocol:
    description: Protocol to match.
    type: string
    examples:
      - tcp_udp
      - tcp
      - udp
      - icmpv6
      - all
    default: all
  source:
    type: object
    properties:
      address:
        description: IPv6 network (CIDR notation).
        type: string
        format: uc-cidr6
        example: 2001:db8::/32
      port:
        type: string
      mac-address:
        type: string
        format: uc-mac
        example: 98:e7:9a:27:fe:49
      group:
        type: object
        properties:
          address-group:
            description: Reference to IPv6 address group.
            type: string
          network-group:
            description: Reference to IPv6 network group.
            type: string
          port-group:
            description: Reference to IPv4 port group.
            type: string
  destination:
    type: object
    properties:
      address:
        description: IPv6 network (CIDR notation).
        type: string
        format: uc-cidr6
        example: 2001:db8::/32
      port:
        type: string
      group:
        type: object
        properties:
          address-group:
            description: Reference to IPv6 address group.
            type: string
          network-group:
            description: Reference to IPv6 network group.
            type: string
          port-group:
            description: Reference to IPv4 port group.
            type: string
  state:
    type: object
    properties:
      established:
        type: boolean
      related:
        type: boolean
      new:
        type: boolean
      invalid:
        type: boolean
  icmpv6:
    description: ICMPv6 matching.
    type: object
    properties:
      type:
        type: string
        examples:
          - echo-request
          - echo-reply
          - neighbor-solicitation
          - neighbor-advertisement
          - router-solicitation
          - router-advertisement
      code:
        type: integer
  tcp:
    type: object
    properties:
      flags:
        type: object
        properties:
          set:
            type: array
            items:
              type: string
              enum:
                - syn
                - ack
                - fin
                - rst
                - urg
                - psh
          not-set:
            type: array
            items:
              type: string
              enum:
                - syn
                - ack
                - fin
                - rst
                - urg
                - psh
  limit:
    type: object
    properties:
      rate:
        type: string
      burst:
        type: integer
  log:
    type: boolean
    default: false
required:
  - rule-number
  - action
  - protocol
