description: BGP routing protocol configuration.
type: object
properties:
  local-as:
    description: Local autonomous system number.
    type: integer
    minimum: 1
    maximum: 4294967295
  router-id:
    description: BGP router ID.
    type: string
    format: ipv4
  neighbors:
    description: BGP neighbors.
    type: array
    items:
      type: object
      properties:
        address:
          description: Neighbor IP address.
          type: string
          format: uc-ip
        port:
          type: integer
          minimum: 1
          maximum: 65535
        remote-as:
          description: Neighbor AS number.
          type: integer
          minimum: 1
          maximum: 4294967295
        update-source:
          description: Source interface for BGP session.
          type: string
        passive:
          description: Only accept inbound connections.
          type: boolean
          default: false
        advertisement-interval:
          type: integer
          minimum: 0
          maximum: 600
          default: 30
        ebgp-multihop:
          description: The number of hops to reach the neighbor.
          type: integer
          minimum: 1
        password:
          description: MD5 authentication password.
          type: string
        peer-params:
          type: array
          items:
            type: object
            properties:
              address-family:
                type: string
                enum:
                - ipv4-unicast
                - ipv6-unicast
                - ipv4-multicast
                - ipv6-multicast
              nexthop-self:
                type: boolean
                default: false
              soft-reconfig:
                type: boolean
                default: false
              default-originate:
                description: Advertise default route to this neighbor.
                type: boolean
                default: false
            required:
            - address-family
      required:
      - address
      - remote-as
      - peer-params
  networks:
    description: Networks to advertise.
    type: array
    items:
      type: object
      properties:
        address-family:
          type: string
          enum:
          - ipv4-unicast
          - ipv6-unicast
          - ipv4-multicast
          - ipv6-multicast
        network:
          type: string
          format: uc-cidr
      required:
      - address-family
      - network
  redistribute:
    description: Import routes from other sources into BGP.
    type: object
    properties:
      connected:
        description: Redistribute directly connected networks.
        type: boolean
        default: false
      static:
        description: Redistribute static routes.
        type: boolean
        default: false
      ospf:
        description: Redistribute OSPF routes.
        type: boolean
        default: false
      rip:
        description: Redistribute RIP routes.
        type: boolean
        default: false
required:
- local-as
