description:
  This section describes the vlan behaviour of a logical network interface.
type: object
properties:
  id:
    description:
      This is the pvid of the vlan that shall be assigned to the interface.
      The individual physical network devices contained within the interface
      need to be told explicitly if egress traffic shall be tagged.
    type: integer
    minimum: 1
    maximum: 4094
  proto:
    decription:
      The L2 vlan tag that shall be added (1q,1ad)
    type: string
    enum:
      - 802.1ad
      - 802.1q
    default: 802.1q
  role:
    description: Interface role.
    type: string
    enum:
    - upstream
    - downstream
    - local
  enabled:
    description: Enable or disable the interface.
    type: boolean
    default: true
  mac-address:
    description: Mac address of the interface.
    type: string
    format: uc-mac
    example: 98:e7:9a:27:fe:49
  mtu:
    description: Maximum Transmission Unit.
    type: integer
    maximum: 9000
    minimum: 68
  name:
    description: Interface name.
    type: string
  ipv4:
    $ref: https://ucentral.io/schema/v1/interface/ipv4/
  ipv6:
    $ref: https://ucentral.io/schema/v1/interface/ipv6/
