description: Source NAT rule (SNAT/Masquerade).
type: object
properties:
  rule-number:
    type: integer
    minimum: 1
  description:
    type: string
  outbound-interface:
    description: Outbound interface for NAT.
    type: string
  source:
    type: object
    properties:
      address:
        type: string
  translation:
    type: object
    properties:
      address:
        description: Translated address. Use 'masquerade' for dynamic.
        type: string
required:
- rule-number
