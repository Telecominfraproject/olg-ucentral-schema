description: IPsec VPN configuration.
type: object
properties:
  interface:
    description: Interface facing the remote peer.
    type: string
  ike-groups:
    description: IKE (Phase 1) group definitions.
    type: array
    items:
      type: object
      properties:
        name:
          description: Name identifier for this IKE group.
          type: string
        key-exchange:
          description: IKE version to use for key exchange.
          type: string
          enum: [ikev1, ikev2]
          default: ikev2
        lifetime:
          description: IKE SA lifetime in seconds.
          type: integer
          default: 28800
        proposal:
          description: Cryptographic proposal for IKE negotiation.
          type: object
          properties:
            encryption:
              description: Encryption algorithm for IKE SA.
              type: string
              enum: [aes128, aes256, aes128gcm, aes256gcm, 3des]
            hash:
              description: Hash algorithm for IKE SA integrity.
              type: string
              enum: [sha1, sha256, sha384, sha512]
            dh-group:
              description: Diffie-Hellman group number for key exchange.
              type: integer
              enum: [2, 14, 15, 16, 19, 20, 21]
          required: [encryption, hash, dh-group]
        dead-peer-detection:
          description: Dead Peer Detection (DPD) settings.
          type: object
          properties:
            action:
              description: Action to take when a dead peer is detected.
              type: string
              enum: [restart, clear, hold, none]
            interval:
              description: Interval in seconds between DPD keepalive messages.
              type: integer
              default: 30
            timeout:
              description: Timeout in seconds before declaring a peer dead.
              type: integer
              default: 120
        close-action:
          description: Action to take when the remote peer closes the connection.
          type: string
          enum: [none, start, hold]
          default: none
      required: [name, proposal]
  esp-groups:
    description: ESP (Phase 2) group definitions.
    type: array
    items:
      type: object
      properties:
        name:
          description: Name identifier for this ESP group.
          type: string
        lifetime:
          description: ESP SA lifetime in seconds.
          type: integer
          default: 3600
        mode:
          description: IPsec encapsulation mode.
          type: string
          enum: [tunnel, transport]
          default: tunnel
        pfs:
          description: Enable Perfect Forward Secrecy.
          type: boolean
          default: true
        proposal:
          description: Cryptographic proposal for ESP negotiation.
          type: object
          properties:
            encryption:
              description: Encryption algorithm for ESP SA.
              type: string
              enum: [aes128, aes256, aes128gcm, aes256gcm, 3des]
            hash:
              description: Hash algorithm for ESP SA integrity.
              type: string
              enum: [sha1, sha256, sha384, sha512]
          required: [encryption, hash]
      required: [name, proposal]
  authentication:
    description: Pre-shared key (PSK) authentication configuration.
    type: object
    properties:
      id:
        description: List of local and remote IDs authorized to use this PSK.
        type: array
        items:
          type: string
      secret:
        description: Pre-shared key secret.
        type: string
    required: [id, secret]
  peers:
    description: IPsec peer configurations.
    type: array
    items:
      type: object
      properties:
        name:
          description: Name identifier for this peer configuration.
          type: string
        local-address:
          description: Local IP address for the IPsec connection.
          type: string
          format: ipv4
        remote-address:
          description: Remote peer IP address.
          type: string
          format: ipv4
        local-id:
          description: Local identity for IKE authentication.
          type: string
        remote-id:
          description: Remote identity for IKE authentication.
          type: string
        ike-group:
          description: Name of the IKE group to use for this peer.
          type: string
        esp-group:
          description: Name of the ESP group to use for this peer.
          type: string
        connection-type:
          description: Connection initiation behavior.
          type: string
          enum: [initiate, none, trap]
          default: none
        tunnels:
          description: Policy-based tunnels (traffic selectors).
          type: array
          items:
            type: object
            properties:
              local-prefix:
                description: Local subnet for this tunnel.
                type: string
                format: uc-cidr4
              remote-prefix:
                description: Remote subnet for this tunnel.
                type: string
                format: uc-cidr4
            required: [local-prefix, remote-prefix]
      required:
        - name
        - local-address
        - remote-address
        - ike-group
        - esp-group
        - tunnels
required:
  - interface
  - ike-groups
  - esp-groups
  - authentication
  - peers
