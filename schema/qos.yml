description: Traffic policing configuration (shaping, rate limiting, priority-based queues).
type: object
properties:
  shaper:
    description: Traffic shaper policies for bandwidth management.
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        classes:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                minimum: 2
                maximum: 4095
              bandwidth:
                description: Guarantee bandwidth of the class.
                type: string
                example:
                 - 40%
                 - 100mbit
              match:
                description: Matching rules for this class.
                type: array
                items:
                  type: object
                  properties:
                    name:
                      description: Name of the matching rule
                      type: string
                    source:
                      description: Source matching criteria.
                      type: object
                      properties:
                        address:
                          description: Source IPv4 address or network (CIDR).
                          type: string
                          anyOf:
                            - format: ipv4
                            - format: uc-cidr4
                        port:
                          description: Source port or range.
                          type: integer
                          maximum: 65535
                          minimum: 1
                    destination:
                      description: Destination matching criteria.
                      type: object
                      properties:
                        address:
                          description: Destination address or network (CIDR).
                          type: string
                          anyOf:
                            - format: ipv4
                            - format: uc-cidr4
                        port:
                          description: Destination port or range.
                          type: integer
                          maximum: 65535
                          minimum: 1
                    protocol:
                      description:
                        IP protocol to match.
                        Use "all" for all protocols and "tcp_udp" for both TCP and UDP.
                      type: string
                      enum: 
                        - tcp
                        - udp
                        - icmp
                        - all
                    inbound-interface:
                      description: Match traffic arriving on this interface.
                      type: string
              burst:
                description: Size of token bucket (in bytes), which will be available to be sent at ceiling speed.
                type: string
                default: 15kb
              ceiling:
                description: Maximum speed possible for this class. Default is bandwidth value.
                type: string
                example: 100mbit
              priority:
                description: Priority for usage of available bandwidth once guarantees have been met. The lower the priority number, the higher the priority.
                type: integer
                minimum: 0
                maximum: 20
              queue-type:
                type: string
                enum:
                - fq-codel
                - fair-queue
                - drop-tail
                default: fq-codel
            required:
            - id
            - priority
            - bandwidth
        default:
          type: object
          properties:
            bandwidth:
              description: Guarantee bandwidth (in percentage) of the class.
              type: string
              example: 40%
            burst:
              description: Size of token bucket (in bytes), which will be available to be sent at ceiling speed.
              type: string
              example: 15Kb
            ceiling:
              description: Maximum speed possible for this class. Default is bandwidth value.
              type: string
              example: 100mbit
            queue-type:
              type: string
              enum:
              - fq-codel
              - fair-queue
              - drop-tail
              default: fq-codel
          required:
          - bandwidth
      required:
      - name
      - bandwidth
  interfaces:
    type: array
    items:
      type: object
      properties:
        name:
          description: Name of the interface to apply QoS policy
          type: string
        policy:
          description: Name of the QoS policy (e.g. shaper) to apply on this interface
          type: string
