description: IGMP-Proxy configuration.
type: object
properties:
  upstream-interface:
    description: Interface facing the multicast source.
    type: string
  downstream-interfaces:
    description: Interfaces facing multicast receivers.
    type: array
    items:
      type: string
  alt-subnets:
    description: Additional subnets allowed to send multicast traffic.
    type: array
    items:
      type: string
      format: uc-cidr4
