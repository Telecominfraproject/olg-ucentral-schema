description: RIP routing protocol configuration.
type: object
properties:
  version:
    type: number
    enum: [1, 2]
    default: 2
  networks:
    description: Networks to advertise.
    type: array
    items:
      type: string
      format: uc-cidr4
  interfaces:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        passive:
          type: boolean
          default: false
      required:
      - name
  neighbors:
    description: Neighbors to advertise with unicast
    type: array
    items:
      type: string
      format: ipv4
  redistribute:
    description: Import routes from other sources into RIP.
    type: object
    properties:
      connected:
        type: boolean
        default: false
      static:
        type: boolean
        default: false
      bgp:
        type: boolean
        default: false
      ospf:
        type: boolean
        default: false
