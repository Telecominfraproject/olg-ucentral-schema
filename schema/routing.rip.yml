description: RIP routing protocol configuration.
type: object
properties:
  version:
    type: string
    enum:
    - '1'
    - '2'
    default: '2'
  networks:
    description: Networks to advertise.
    type: array
    items:
      type: string
      format: uc-cidr4
  interfaces:
    type: array
    items:
      type: string
  passive-interfaces:
    type: array
    items:
      type: string
  neighbors:
    description: Neighbors to advertise with unicast
    type: array
    items:
      type: string
      format: ipv4
  redistribute:
    type: object
    properties:
      connected:
        type: boolean
        default: false
      static:
        type: boolean
        default: false
      babel:
        type: boolean
        default: false
      bgp:
        type: boolean
        default: false
      isis:
        type: boolean
        default: false
      kernel:
        type: boolean
        default: false
      nhrp:
        type: boolean
        default: false
      ospf:
        type: boolean
        default: false
