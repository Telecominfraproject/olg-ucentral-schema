description: Logical network interface configuration.
type: object
properties:
  name:
    description: Interface name.
    type: string
  type:
    description: Interface type.
    type: string
    enum:
      - ethernet
      - bridge
      - loopback
      - pppoe
      - vti
      - dummy
    default: ethernet
  role:
    description: Interface role.
    type: string
    enum:
    - upstream
    - downstream
    - local
  enabled:
    description: Enable or disable the interface.
    type: boolean
    default: true
  mac-address:
    description: Mac address of the interface.
    type: string
    format: uc-mac
    example: 98:e7:9a:27:fe:49
  mtu:
    description: Maximum Transmission Unit.
    type: integer
    maximum: 9000
    minimum: 68
  ethernet:
    $ref: https://ucentral.io/schema/v1/interface/ethernet/
  vlan:
    type: array
    description: VLAN sub-interfaces.
    items:
      $ref: https://ucentral.io/schema/v1/interface/vlan/
  bridge:
    $ref: https://ucentral.io/schema/v1/interface/bridge/
  pppoe:
    $ref: https://ucentral.io/schema/v1/interface/pppoe/
  vti:
    $ref: https://ucentral.io/schema/v1/interface/vti/
  ipv4:
    $ref: https://ucentral.io/schema/v1/interface/ipv4/
  ipv6:
    $ref: https://ucentral.io/schema/v1/interface/ipv6/
