description: Firewall ruleset configuration.
type: object
properties:
  name:
    type: string
  default-action:
    type: string
    enum:
    - accept
    - drop
    - reject
    default: drop
  rules:
    type: array
    items:
      $ref: https://ucentral.io/schema/v1/firewall/rule/
required:
- name
