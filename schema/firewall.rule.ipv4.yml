description: IPv4 firewall rule configuration.
type: object
properties:
  rule-number:
    description: Rule sequence number. Lower numbers evaluated first.
    type: integer
    minimum: 1
    maximum: 65535
  disabled:
    type: boolean
    default: false
  action:
    type: string
    enum:
      - accept
      - drop
      - reject
  protocol:
    description: Protocol to match.
    type: string
    examples:
      - tcp_udp
      - tcp
      - udp
      - icmp
      - ospf
      - all
    default: all
  source:
    type: object
    properties:
      address:
        description: Source IPv4 address or network.
        type: string
        anyOf:
          - format: uc-fw-ipv4
          - format: uc-fw-cidr4
          - format: uc-fw-ip4range
        examples:
          - "!192.168.0.9"
          - "10.28.3.0/24"
          - "!10.76.5.98-10.76.5.187"
      port:
        description: Source port or port range.
        type: 
          - integer
          - string
        format: uc-portrange
        examples:
          - 80
          - 1024-65535
      mac-address:
        type: string
        format: uc-mac
        example: 98:e7:9a:27:fe:49
      group:
        type: object
        properties:
          address-group:
            description: Reference to IPv4 address group.
            type: string
          network-group:
            description: Reference to IPv4 network group.
            type: string
          port-group:
            description: Reference to IPv4 port group.
            type: string
  destination:
    type: object
    properties:
      address:
        description: Destination IPv4 address or network.
        type: string
        anyOf:
          - format: uc-fw-ipv4
          - format: uc-fw-cidr4
          - format: uc-fw-ip4range
        examples:
          - "!192.168.0.9"
          - "10.28.3.0/24"
          - "!10.76.5.98-10.76.5.187"
      port:
        description: Destination port or port range.
        type: 
          - integer
          - string
        format: uc-portrange
        examples:
          - 80
          - 1024-65535
      group:
        type: object
        properties:
          address-group:
            description: Reference to IPv4 address group.
            type: string
          network-group:
            description: Reference to IPv4 network group.
            type: string
          port-group:
            description: Reference to IPv4 port group.
            type: string
  state:
    type: object
    properties:
      established:
        type: boolean
      related:
        type: boolean
      new:
        type: boolean
      invalid:
        type: boolean
  icmp:
    description: ICMP matching (IPv4).
    type: object
    properties:
      type:
        type: string
        examples:
          - echo-request
          - echo-reply
          - destination-unreachable
      code:
        type: integer
  tcp:
    type: object
    properties:
      flags:
        type: object
        properties:
          set:
            type: array
            items:
              type: string
              enum:
                - syn
                - ack
                - fin
                - rst
                - urg
                - psh
          not-set:
            type: array
            items:
              type: string
              enum:
                - syn
                - ack
                - fin
                - rst
                - urg
                - psh
  limit:
    type: object
    properties:
      rate:
        type: string
      burst:
        type: integer
  log:
    type: boolean
    default: false
required:
  - rule-number
  - action
  - protocol
