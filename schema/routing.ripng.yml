description: RIPng (IPv6) routing protocol configuration.
type: object
properties:
  networks:
    description: IPv6 networks to advertise.
    type: array
    items:
      type: string
      format: uc-cidr6
  interfaces:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        passive:
          type: boolean
          default: false
      required:
      - name
  redistribute:
    type: object
    properties:
      connected:
        type: boolean
        default: false
      static:
        type: boolean
        default: false
      babel:
        type: boolean
        default: false
      bgp:
        type: boolean
        default: false
      isis:
        type: boolean
        default: false
      kernel:
        type: boolean
        default: false
      nhrp:
        type: boolean
        default: false
      ospf:
        type: boolean
        default: false
