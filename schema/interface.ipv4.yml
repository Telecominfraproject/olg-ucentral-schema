description: IPv4 interface configuration.
type: object
properties:
  addressing:
    description: Address assignment method.
    type: string
    enum:
      - static
      - dhcp
      - none
  address:
    description: IPv4 addresses in CIDR notation.
    type: array
    items:
      type: string
      format: uc-cidr4
  gateway:
    description: Default gateway.
    type: string
    format: ipv4
