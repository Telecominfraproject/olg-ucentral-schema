description: Firewall address, port, and MAC groups for reuse in rules.
type: object
properties:
  ipv4-address-groups:
    description: Groups of IPv4 addresses.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in IPv4 rules.
          type: string
        members:
          description: IPv4 addresses.
          type: array
          items:
            type: string
            anyOf:
              - format: ipv4
              - format: uc-ip4range
      required:
        - name
        - members
  ipv4-network-groups:
    description: Groups of IPv4 networks.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in IPv4 rules.
          type: string
        members:
          description: IPv4 networks in CIDR notation.
          type: array
          items:
            type: string
            format: uc-cidr4
            example: 192.168.1.0/24
      required:
        - name
        - members
  ipv6-address-groups:
    description: Groups of IPv6 addresses.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in IPv6 rules.
          type: string
        members:
          description: IPv6 addresses.
          type: array
          items:
            type: string
            anyOf:
              - format: ipv6
              - format: uc-ip6range
      required:
        - name
        - members
  ipv6-network-groups:
    description: Groups of IPv6 networks.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in IPv6 rules.
          type: string
        members:
          description: IPv6 networks in CIDR notation.
          type: array
          items:
            type: string
            format: uc-cidr6
            example: 2001:db8::/32
      required:
        - name
        - members
  port-groups:
    description: Groups of ports. Shared between IPv4 and IPv6 rulesets.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in rules.
          type: string
        members:
          description: Ports or port ranges.
          type: array
          items:
            type:
              - integer
              - string
            examples:
              - 80
              - 8080-8090
      required:
        - name
        - members
  mac-groups:
    description: Groups of MAC addresses for bridge firewall rules.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in bridge rules.
          type: string
        description:
          type: string
        members:
          description: MAC addresses.
          type: array
          items:
            type: string
            format: uc-mac
            example: 98:e7:9a:27:fe:49
      required:
        - name
        - members
  domain-groups:
    description: Groups of domain names. Shared between IPv4 and IPv6 rulesets.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in rules.
          type: string
        description:
          type: string
        members:
          description: Domain names (resolved dynamically).
          type: array
          items:
            type: string
            format: hostname
      required:
        - name
        - members
