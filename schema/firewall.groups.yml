description: Firewall address, port, and MAC groups for reuse in rules.
type: object
properties:
  ipv4-address-groups:
    description: Groups of IPv4 addresses or networks.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in IPv4 rules.
          type: string
        members:
          description: IPv4 addresses or networks in CIDR notation.
          type: array
          items:
            type: string
          examples:
            - "10.0.0.1"
            - "192.168.1.0/24"
            - "172.16.0.0/12"
      required:
        - name
        - members
  ipv6-address-groups:
    description: Groups of IPv6 addresses or networks.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in IPv6 rules.
          type: string
        members:
          description: IPv6 addresses or networks in CIDR notation.
          type: array
          items:
            type: string
          examples:
            - "2001:db8::1"
            - "2001:db8::/32"
            - "fd00::/8"
      required:
        - name
        - members
  port-groups:
    description: Groups of ports. Shared between IPv4 and IPv6 rulesets.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in rules.
          type: string
        members:
          description: Ports, port ranges, or service names.
          type: array
          items:
            type: string
          examples:
            - "80"
            - "443"
            - "8080-8090"
            - "http"
            - "https"
      required:
        - name
        - members
  mac-groups:
    description: Groups of MAC addresses for bridge firewall rules.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in bridge rules.
          type: string
        description:
          type: string
        members:
          description: MAC addresses.
          type: array
          items:
            type: string
          examples:
            - "00:11:22:33:44:55"
            - "aa:bb:cc:dd:ee:ff"
      required:
        - name
        - members
  domain-groups:
    description: Groups of domain names. Shared between IPv4 and IPv6 rulesets.
    type: array
    items:
      type: object
      properties:
        name:
          description: Group name for reference in rules.
          type: string
        description:
          type: string
        members:
          description: Domain names (resolved dynamically).
          type: array
          items:
            type: string
          examples:
            - "example.com"
            - "*.google.com"
      required:
        - name
        - members