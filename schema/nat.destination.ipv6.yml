description: IPv6 Destination NAT rule.
type: object
properties:
  rule-number:
    description: Rule number for ordering (lower numbers processed first).
    type: integer
    minimum: 1
  inbound-interface:
    description: Inbound interface for NAT.
    type: string
  protocol:
    description: Protocol to match.
    type: string
    examples:
      - tcp
      - udp
      - icmpv6
      - all
  target-zone:
    description: The zone that this packet should be forward to
    type: string
  source:
    description: Source address/port to match.
    type: object
    properties:
      prefix:
        description: Source IPv6 prefix.
        type: string
        format: uc-cidr6
        example: 2001:db8:1::/64
      port:
        description: Source port or port range.
        type: 
          - integer
          - string
        format: uc-portrange
        examples:
          - 80
          - 1024-65535
      group:
        description: Reference to a firewall address/network/port group.
        type: object
        properties:
          address-group:
            type: string
          network-group:
            type: string
          port-group:
            type: string
  destination:
    description: Original destination address/port to match.
    type: object
    properties:
      prefix:
        description: Original destination IPv6 prefix.
        type: string
        format: uc-ip
        example: 2001:db8:2::/64
      port:
        description: Original destination port or port range.
        type: 
          - integer
          - string
        format: uc-portrange
        examples:
          - 80
          - 1024-65535
      group:
        description: Reference to a firewall address/network/port group.
        type: object
        properties:
          address-group:
            type: string
          network-group:
            type: string
          port-group:
            type: string
  translation:
    description: Translation parameters.
    type: object
    properties:
      prefix:
        description: Translated destination IPv6 prefix.
        type: string
        format: uc-cidr6
        example: 2001:db8:a::/64
      port:
        description: 
          Translated destination port or port range. 
          Please note that the translated port will be added to 
          port-group WAN_LAN_FORWARDING_GROUP automatically, user can use it for zone
          WAN-to-LAN.
        type: 
          - integer
          - string
        format: uc-portrange
        examples:
          - 80
          - 1024-65535
required:
  - rule-number
