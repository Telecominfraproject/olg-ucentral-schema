description: WAN load balancing configuration.
type: object
properties:
  interfaces:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        failure-count:
          type: integer
          default: 1
          minimum: 1
          maximum: 10
        success-count:
          type: integer
          default: 1
          minimum: 1
          maximum: 10
        failover-only:
          type: boolean
          default: false
        health-check:
          type: object
          properties:
            target:
              description: Outbound interface nexthop address. Can be 'DHCP or IPv4 address'
              type: string
            interval:
              type: integer
              default: 5
          required:
          - target
      required:
      - name
      - health-check
  rules:
    type: array
    items:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          maximum: 9999
        source:
          type: string
          format: uc-cidr
        destination:
          type: string
          format: uc-cidr
        inbound-interface:
          type: string
        wan-interfaces:
          type: array
          items:
            type: object
            properties:
              name:
                description: name of the upstream interface
                type: string
              weight:
                description: weight of this interface
                type: integer
            required:
            - name
      required:
      - id
      - inbound-interface
      - wan-interfaces
