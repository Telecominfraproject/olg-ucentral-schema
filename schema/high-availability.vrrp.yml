description: VRRP configuration.
type: object
properties:
  groups:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        virtual-addresses:
          type: array
          items:
            type: string
        priority:
          type: integer
          minimum: 1
          maximum: 255
          default: 100
        interface:
          type: string
        vrid:
          description: Virtual Router ID.
          type: integer
          minimum: 1
          maximum: 255
        preempt:
          type: boolean
          default: true
      required:
      - name
      - interface
      - vrid
      - virtual-addresses
