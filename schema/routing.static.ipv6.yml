description: Static ipv6 routing configuration.
type: object
properties:
  destination:
    description: Destination network (CIDR).
    type: string
    format: uc-cidr6
  routes:
    type: array
    items:
      type: object
      properties:
        action:
          type: string
          enum:
          - next-hop
          - interface
          - reject
          - blackhole
        interface:
          type: string
        next-hop:
          type: string
          format: ipv6
        distance:
          type: integer
          default: 1
          minimum: 1
required:
  - destination
  - routes
